name: Feature request
description: Suggest an improvement or a new addition to the site.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What's missing or awkward today, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the change or addition you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — other approaches you thought about.
