name: ci-deploy

on:
  pull_request:
    branches: [astro-migration, main]
  push:
    branches: [astro-migration, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-deploy-${{ github.ref }}
  # Cancel superseded runs on feature branches, but never interrupt a main
  # deploy (queue instead).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # cs858-wiki is a public submodule fetched over HTTPS, so it checks
          # out anonymously — no token or deploy key required.
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint (ESLint + Stylelint)
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Markdownlint
        run: npm run markdownlint

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: HTML validate
        run: npm run htmlvalidate

      - name: Test
        run: npm run test

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    needs: ci
    # Deploy only from main (the cutover branch); never on integration-branch or
    # PR runs, which still produce and validate the artifact above.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
