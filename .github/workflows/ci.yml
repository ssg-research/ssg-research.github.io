name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0'
        bundler-cache: true
    - name: Build
      run: JEKYLL_ENV=production bundle exec jekyll build --strict_front_matter
    - name: Check internal links
      run: bundle exec htmlproofer _site --disable-external
    - name: pre-commit
      run: pipx run pre-commit run --all-files --show-diff-on-failure
